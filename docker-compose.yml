services:
  postgres:
    build:
      context: ./deployments/postgres
    # PG_CONFIG_FILE is provided through env_file in each overlay.
    command: ["sh", "-c", "postgres -c config_file=$${PG_CONFIG_FILE}"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # Use container env vars so health checks validate expected DB/user.
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - broker_network

  redis:
    build:
      context: ./deployments/redis
    volumes:
      - redis_data:/data
    healthcheck:
      # Use container env vars so health checks validate expected auth behavior.
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping"]
      interval: 5s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - broker_network

  orderbook:
    build:
      context: ./orderbook
    restart: unless-stopped
    networks:
      - broker_network
    depends_on:
      redis:
        condition: service_healthy

  kline:
    build:
      context: ./kline
    restart: unless-stopped
    networks:
      - broker_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
    name: postgres_data
  redis_data:
    name: redis_data

networks:
  broker_network:
    driver: bridge
