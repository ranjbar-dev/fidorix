services:
  postgres:
    container_name: broker_postgres_prod
    env_file:
      - ./deployments/postgres/.env.production
    build:
      args:
        # BUILD_ENV is kept for explicit build provenance.
        BUILD_ENV: production
    # No host ports in production: DB is reachable only on broker_network.
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 6G

  redis:
    container_name: broker_redis_prod
    env_file:
      - ./deployments/redis/.env.production
    build:
      args:
        # BUILD_ENV is kept for explicit build provenance.
        BUILD_ENV: production
    # No host ports in production: Redis is reachable only on broker_network.
    command: ["sh", "-c", "redis-server /etc/redis/redis.production.conf --requirepass $${REDIS_PASSWORD}"]
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
