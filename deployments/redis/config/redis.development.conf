# Development Redis profile for local broker components.
bind 0.0.0.0
protected-mode no
port 6379

# Redis config cannot read environment variables directly.
# Password is injected by Compose command override:
# redis-server /etc/redis/redis.development.conf --requirepass ${REDIS_PASSWORD}
# Never commit secrets in this file.

# DB 0 - pub/sub relay (BBO, depth updates, kline ticks)
# DB 1 - hot cache (user balances, open positions, active orders)
# DB 2 - rate limiting and session tokens
# DB 3 - reserved / misc ephemeral data
databases 4
loglevel verbose

# Memory profile tuned for lightweight local usage.
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence disabled in dev for faster restarts.
save ""
appendonly no

# Event loop cadence and lazy free behavior.
hz 10
lazyfree-lazy-eviction yes
