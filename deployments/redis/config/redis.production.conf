# Production Redis profile for broker backend workloads.
bind 0.0.0.0
protected-mode yes
port 6379
loglevel notice
databases 4
tcp-keepalive 300
timeout 0

# Redis config cannot read environment variables directly.
# Password is injected by Compose command override:
# redis-server /etc/redis/redis.production.conf --requirepass ${REDIS_PASSWORD}
# Never commit secrets in this file.

# DB 0 - pub/sub relay (BBO, depth updates, kline ticks)
# DB 1 - hot cache (user balances, open positions, active orders)
# DB 2 - rate limiting and session tokens
# DB 3 - reserved / misc ephemeral data

# Memory profile assumes ~2GB dedicated to Redis.
maxmemory 1500mb
maxmemory-policy allkeys-lru
maxmemory-samples 10

# Use AOF-only durability; data persists on mounted /data volume.
save ""
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite yes
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-use-rdb-preamble yes

# Runtime tuning and async free for large keyspace churn.
hz 20
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
activerehashing yes
# activedefrag requires Redis 4.0+; satisfied by base image redis:7.2-alpine.
activedefrag yes
active-defrag-threshold-lower 20

# Slowlog for operational troubleshooting.
slowlog-log-slower-than 10000
slowlog-max-len 256
