# Local development tuning: lower resource usage and verbose SQL logging.
max_connections = 50
shared_buffers = 256MB
work_mem = 16MB
maintenance_work_mem = 128MB
effective_cache_size = 512MB

# Minimize WAL overhead for local runs where replication is not needed.
wal_level = minimal
max_wal_senders = 0

# Verbose logging helps trace query behavior during development.
logging_collector = on
log_statement = 'all'
log_min_duration_statement = 0

# TimescaleDB settings required for extension startup and worker execution.
timescaledb.max_background_workers = 4
shared_preload_libraries = 'timescaledb'
