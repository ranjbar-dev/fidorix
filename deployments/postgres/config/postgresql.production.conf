# Production tuning profile for an 8GB RAM dedicated server.
max_connections = 200
shared_buffers = 2GB
work_mem = 32MB
maintenance_work_mem = 512MB
effective_cache_size = 6GB
checkpoint_completion_target = 0.9
wal_buffers = 64MB
default_statistics_target = 100
random_page_cost = 1.1

# Replication-friendly WAL settings for production durability and observability.
wal_level = replica
max_wal_senders = 3

# Production logging: focus on schema changes and slow queries.
logging_collector = on
log_statement = 'ddl'
log_min_duration_statement = 1000

# TimescaleDB production worker and compression tuning.
timescaledb.max_background_workers = 8
timescaledb.compress_chunk_time_interval = '7 days'
shared_preload_libraries = 'timescaledb'
